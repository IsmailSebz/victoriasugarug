<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Gallery — Victoria Sugar Limited</title>
  <meta name="description" content="Gallery — Victoria Sugar Limited Photo Gallery Uganda">
  <link rel="icon" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hero">
  <div class="container-main page-hero-content">
    <span class="section-label">Photo Gallery</span>
    <h1 style="font-family:Georgia,serif;font-size:2.5rem;font-weight:700;color:#fff;margin:.5rem 0 1rem;">Gallery</h1>
    <p style="color:#b4dab6;max-width:40rem;">Explore life and work at Victoria Sugar — from cane fields to community.</p>
    <nav style="margin-top:1rem;font-size:.875rem;"><a href="/" style="color:#4da052;text-decoration:none;">Home</a> <span style="color:#145218;"> &rsaquo; </span> Gallery</nav>
  </div>
</div>

<section class="section">
  <div class="container-main">
    <div id="album-tabs" class="flex flex-wrap gap-2 mb-8"></div>
    <div id="gallery-grid" class="gallery-grid"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="if(event.target===this)closeLb()">
  <div style="position:relative;max-width:90vw;max-height:90vh;">
    <img id="lb-img" src="" style="max-width:90vw;max-height:80vh;border-radius:.75rem;object-fit:contain;">
    <p id="lb-cap" style="color:#fff;text-align:center;margin-top:.5rem;font-size:.875rem;"></p>
    <button onclick="closeLb()" style="position:absolute;top:-2rem;right:0;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;">&times;</button>
    <button onclick="prevLb()" style="position:absolute;left:-3rem;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.5rem;padding:.5rem .75rem;border-radius:.5rem;cursor:pointer;">&#8249;</button>
    <button onclick="nextLb()" style="position:absolute;right:-3rem;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.5rem;padding:.5rem .75rem;border-radius:.5rem;cursor:pointer;">&#8250;</button>
  </div>
</div>
<style>
.album-tab { padding:.5rem 1rem;border-radius:2rem;font-size:.875rem;font-weight:500;cursor:pointer;border:1px solid #d1d5db;background:#fff;color:#374151;transition:all .2s; }
.album-tab:hover { border-color:#1b5e20;color:#1b5e20; }
.active-tab { background:#1b5e20;color:#fff;border-color:#1b5e20; }
</style>

<div id="footer"></div><div id="inquiry-modal"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>tailwind.config={theme:{extend:{colors:{green:{50:'#f0f7f1',100:'#d9edd9',200:'#b4dab6',300:'#80c083',400:'#4da052',500:'#2e7d32',600:'#1b5e20',700:'#145218',800:'#0f3d12',900:'#0a290c',950:'#051506'},gold:{50:'#fdf9ec',100:'#faf0ca',200:'#f5df92',300:'#efc95a',400:'#c8a84b',500:'#b8922f',600:'#9a7424',700:'#7a5a1c',800:'#5e4415',900:'#3d2c0d',950:'#1f1506'}},fontFamily:{sans:['Inter','system-ui','sans-serif'],heading:['Georgia','Times New Roman','serif']}}}}</script>
<script src="/js/supabase-client.js"></script>
<script src="/js/nav.js"></script><script src="/js/footer.js"></script><script src="/js/inquiry-modal.js"></script>
<script>initNav();initFooter();initInquiryModal();

let albums = [], selectedAlbum = 'all';

async function loadAlbums() {
  const { data } = await db.from('gallery_albums').select('*').eq('active', true).order('created_at', {ascending: false});
  albums = data || [];
  const el = document.getElementById('album-tabs');
  el.innerHTML = '<button class="album-tab active-tab" data-id="all">All Photos</button>' +
    albums.map(a => '<button class="album-tab" data-id="' + a.id + '">' + a.name + '</button>').join('');
  el.querySelectorAll('.album-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('.album-tab').forEach(b => b.classList.remove('active-tab'));
      btn.classList.add('active-tab');
      selectedAlbum = btn.dataset.id;
      loadItems();
    });
  });
  loadItems();
}

async function loadItems() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '<div class="col-span-full text-center py-8 text-gray-400">Loading...</div>';
  let q = db.from('gallery_items').select('*').order('created_at', {ascending: false});
  if (selectedAlbum !== 'all') q = q.eq('album_id', selectedAlbum);
  const { data } = await q;
  if (!data || !data.length) { grid.innerHTML = '<div class="col-span-full text-center py-8 text-gray-400">No photos in this album yet.</div>'; return; }
  grid.innerHTML = data.map((item, i) =>
    '<div style="border-radius:.75rem;overflow:hidden;aspect-ratio:1;cursor:pointer;" onclick="openLightbox(' + i + ')">' +
    '<img src="' + item.image_url + '" alt="' + (item.caption || 'Gallery') + '" style="width:100%;height:100%;object-fit:cover;transition:transform .5s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform=''">' +
    '</div>'
  ).join('');
  // store for lightbox
  window._galleryItems = data;
}

function openLightbox(i) {
  window._lbIdx = i;
  const item = window._galleryItems[i];
  document.getElementById('lb-img').src = item.image_url;
  document.getElementById('lb-cap').textContent = item.caption || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLb() { document.getElementById('lightbox').classList.remove('open'); }
function prevLb() { openLightbox((window._lbIdx - 1 + window._galleryItems.length) % window._galleryItems.length); }
function nextLb() { openLightbox((window._lbIdx + 1) % window._galleryItems.length); }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') prevLb();
  if (e.key === 'ArrowRight') nextLb();
});

loadAlbums();

</script>
</body></html>
