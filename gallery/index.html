<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Gallery — Victoria Sugar Limited</title>
  <meta name="description" content="Gallery — Victoria Sugar Limited Photo Gallery Uganda">
  <link rel="icon" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/pages/gallery.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hero">
  <div class="container-main page-hero-content">
    <span class="section-label">Photo Gallery</span>
    <h1 class="page-hero-title">Gallery</h1>
    <p class="page-hero-subtitle">Explore life and work at Victoria Sugar — from cane fields to community.</p>
    <nav class="breadcrumb"><a class="breadcrumb-link" href="/">Home</a> <span class="breadcrumb-sep"> &rsaquo; </span> Gallery</nav>
  </div>
</div>

<section class="section">
  <div class="container-main">
    <div id="album-tabs" class="flex flex-wrap gap-2 mb-8"></div>
    <div id="gallery-grid" class="gallery-grid"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="if(event.target===this)closeLb()">
  <div class="gallery-block">
    <img class="gallery-media" id="lb-img" src="">
    <p class="gallery-text-center-block" id="lb-cap"></p>
    <button class="gallery-abs-el" onclick="closeLb()">&times;</button>
    <button class="gallery-abs-el-2" onclick="prevLb()">&#8249;</button>
    <button class="gallery-abs-el-3" onclick="nextLb()">&#8250;</button>
  </div>
</div>
<div id="footer"></div><div id="inquiry-modal"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/tailwind-config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/nav.js"></script><script src="/js/footer.js"></script><script src="/js/inquiry-modal.js"></script>
<script src="/js/pages/gallery.js"></script>
</body></html>
