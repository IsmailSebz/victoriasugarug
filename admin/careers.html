<main class="admin-main"><div class="admin-container"><div class="admin-page-header"><h1 class="admin-page-title">Job Listings</h1><button onclick="openModal()" class="btn-primary">+ Add New</button></div>
<div class="card admin-table-wrap"><table class="admin-table"><thead><tr><th class="admin-table-th">Title</th><th class="admin-table-th">Department</th><th class="admin-table-th">Location</th><th class="admin-table-th">Status</th><th class="admin-table-th">Deadline</th><th class="admin-table-th-plain"></th></tr></thead><tbody id="items-body"><tr><td class="admin-table-empty" colspan="6">Loading...</td></tr></tbody></table></div>
<div class="admin-modal-overlay" id="modal-overlay"><div class="admin-modal-box"><button class="admin-modal-close" onclick="closeModal()">&times;</button><h2 class="admin-modal-title" id="modal-title">Add New</h2><form id="item-form"><input type="hidden" name="_id">
<div class="mb-4"><label class="form-label">Job Title *</label><input class="form-input" name="title" required></div>
<div class="mb-4"><label class="form-label">Department</label>
  <select class="form-input" name="department">
    <option>Agriculture</option><option>Engineering</option><option>Finance</option>
    <option>HR</option><option>Operations</option><option>Commercial</option><option>IT</option><option>Admin</option>
  </select></div>
<div class="mb-4"><label class="form-label">Location</label><input class="form-input" name="location" placeholder="e.g. Luwero, Uganda"></div>
<div class="mb-4"><label class="form-label">Deadline</label><input class="form-input" type="date" name="deadline"></div>
<div class="mb-4"><label class="form-label">Description</label><textarea class="form-input" name="description" rows="4"></textarea></div>
<div class="admin-careers-flex-row"><input type="checkbox" name="is_active" id="f-active" checked><label for="f-active" class="form-label m-0">Active (visible on site)</label></div>
<div class="admin-form-error" id="form-error"></div><div class="admin-btn-row"><button type="submit" id="form-submit" class="btn-primary flex-1 justify-center">Save</button><button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button></div></form></div></div>
</div></main></div>
