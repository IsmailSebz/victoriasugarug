<main class="admin-main"><div class="admin-container">
<h1 class="admin-settings-heading">Settings</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div class="card p-6">
    <h3 class="subheading-mb">Change Password</h3>
    <form id="pw-form">
      <div class="mb-4"><label class="form-label">Current Password</label><input type="password" class="form-input" name="current" required></div>
      <div class="mb-4"><label class="form-label">New Password</label><input type="password" class="form-input" name="new" required minlength="6"></div>
      <div class="mb-6"><label class="form-label">Confirm New Password</label><input type="password" class="form-input" name="confirm" required></div>
      <div class="admin-settings-toggle-hidden" id="pw-msg"></div>
      <button type="submit" class="btn-primary">Update Password</button>
    </form>
  </div>
  <div class="card p-6">
    <h3 class="subheading-mb">Account Info</h3>
    <div class="admin-settings-text-style" id="acct-info"></div>
    <div class="mt-6">
      <h4 class="admin-settings-text-style-2">Quick Links</h4>
      <div class="space-y-2">
        <a class="admin-settings-link" href="/" target="_blank">→ View Website</a>

    </div>
  </div>
