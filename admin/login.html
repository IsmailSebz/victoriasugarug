<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — Victoria Sugar</title>
  <link rel="icon" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/admin.css"><link rel="stylesheet" href="/css/pages/admin-login.css">
</head>
<body class="admin-login-flex-row">
  <div class="admin-login-block">
    <div class="text-center mb-8">
      <img class="admin-login-media" src="/logo.jpg">
      <h1 class="admin-login-heading">Admin Login</h1>
      <p class="text-muted-mt">Victoria Sugar Limited</p>
    </div>
    <form id="login-form">
      <div class="mb-4"><label class="form-label">Email Address</label><input id="email" type="email" class="form-input" placeholder="admin@victoriasugar.com" required></div>
      <div class="mb-6"><label class="form-label">Password</label><input id="password" type="password" class="form-input" placeholder="••••••••" required></div>
      <div class="admin-login-toggle-hidden" id="login-error"></div>
      <button type="submit" id="login-btn" class="btn-primary w-full justify-center">Sign In</button>
    </form>
    <p class="admin-login-text-center-block">For access issues contact your administrator.</p>
  </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/tailwind-config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/pages/admin-login.js"></script>
</body></html>
