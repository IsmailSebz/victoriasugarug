<main style="margin-left:15rem;flex:1;padding:2rem;"><div style="max-width:72rem;margin:0 auto;">
<style>
.album-tab-btn{padding:.375rem .875rem;border-radius:2rem;font-size:.8125rem;font-weight:500;cursor:pointer;border:1px solid #d1d5db;background:#fff;color:#374151;transition:all .15s;}
.album-tab-btn:hover{border-color:#1b5e20;color:#1b5e20;}
.active-tab{background:#1b5e20!important;color:#fff!important;border-color:#1b5e20!important;}
</style>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
  <h1 style="font-family:Georgia,serif;font-size:1.875rem;font-weight:700;color:#0f3d12;">Gallery</h1>
  <div style="display:flex;gap:.75rem;">
    <button onclick="openAlbumModal()" class="btn-secondary text-sm px-4 py-2">+ Add Album</button>
    <button onclick="openItemModal()" class="btn-primary text-sm px-4 py-2">+ Add Photo</button>
  </div>
</div>

<div class="card p-6 mb-6">
  <h3 style="font-family:Georgia,serif;font-weight:700;color:#0f3d12;margin-bottom:1rem;">Albums</h3>
  <div id="albums-list" class="flex flex-wrap gap-2 mb-4"></div>
  <div style="font-size:.75rem;color:#9ca3af;">Click an album to filter photos. Add photos with + Add Photo above.</div>
</div>

<div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>

<!-- Album Modal -->
<div id="album-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:1rem;padding:2rem;max-width:28rem;width:100%;position:relative;">
    <button onclick="document.getElementById('album-modal').style.display='none'" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;font-size:1.5rem;">&times;</button>
    <h2 style="font-family:Georgia,serif;font-weight:700;color:#0f3d12;margin-bottom:1.5rem;">Add Album</h2>
    <form id="album-form">
      <div style="margin-bottom:1rem;"><label class="form-label">Album Name *</label><input class="form-input" name="name" required></div>
      <div style="margin-bottom:1.5rem;"><label class="form-label">Description</label><textarea class="form-input" name="description" rows="2"></textarea></div>
      <button type="submit" class="btn-primary w-full justify-center">Create Album</button>
    </form>
  </div>
</div>

<!-- Photo Modal -->
<div id="item-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:1rem;padding:2rem;max-width:28rem;width:100%;position:relative;">
    <button onclick="document.getElementById('item-modal').style.display='none'" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;font-size:1.5rem;">&times;</button>
    <h2 style="font-family:Georgia,serif;font-weight:700;color:#0f3d12;margin-bottom:1.5rem;">Add Photo</h2>
    <form id="photo-form">
      <div style="margin-bottom:1rem;"><label class="form-label">Image URL * (from R2)</label><input class="form-input" name="image_url" placeholder="https://media.victoriasugar.ug/images/..." required></div>
      <div style="margin-bottom:1rem;"><label class="form-label">Caption</label><input class="form-input" name="caption" placeholder="Optional caption"></div>
      <div style="margin-bottom:1.5rem;"><label class="form-label">Album</label><select class="form-input" name="album_id" id="photo-album-select"><option value="">No album</option></select></div>
      <div id="photo-preview" style="margin-bottom:1rem;display:none;"><img id="preview-img" style="width:100%;border-radius:.5rem;max-height:10rem;object-fit:cover;"></div>
      <div id="photo-err" style="display:none;color:#dc2626;font-size:.875rem;margin-bottom:1rem;"></div>
      <button type="submit" class="btn-primary w-full justify-center">Add Photo</button>
    </form>
  </div>
</div>
</div></main></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>tailwind.config={theme:{extend:{colors:{green:{50:'#f0f7f1',100:'#d9edd9',200:'#b4dab6',300:'#80c083',400:'#4da052',500:'#2e7d32',600:'#1b5e20',700:'#145218',800:'#0f3d12',900:'#0a290c',950:'#051506'},gold:{50:'#fdf9ec',100:'#faf0ca',200:'#f5df92',300:'#efc95a',400:'#c8a84b',500:'#b8922f',600:'#9a7424',700:'#7a5a1c',800:'#5e4415',900:'#3d2c0d',950:'#1f1506'}},fontFamily:{sans:['Inter','system-ui','sans-serif'],heading:['Georgia','Times New Roman','serif']}}}}</script>
<script src="/js/supabase-client.js"></script>
<script>
const SUPABASE_URL='https://ffsddbbtgoxbqlrnvcrm.supabase.co';
const SUPABASE_SERVICE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmc2RkYmJ0Z294YnFscm52Y3JtIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY0MTMxNCwiZXhwIjoyMDk4MjE3MzE0fQ.OJVRH623HKsMbGah9Zj3zfHLQZOgAR1zNy6fHqJ-3JA';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmc2RkYmJ0Z294YnFscm52Y3JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDEzMTQsImV4cCI6MjA5ODIxNzMxNH0.EYNEFQqUR7ZV63XCHKo_RuS2tIJRxN1VfF6Tx3BAb3I';
const {createClient}=supabase;const db=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const dbAdmin=createClient(SUPABASE_URL,SUPABASE_SERVICE_KEY);
async function checkAuth(){const{data:{session}}=await db.auth.getSession();if(!session){window.location.href='/admin/login.html';return null;}return session;}
document.getElementById("logout-btn").addEventListener("click",async()=>{await db.auth.signOut();window.location.href="/admin/login.html";});
(async()=>{const s=await checkAuth();if(s)document.getElementById("admin-user").textContent=s.user.email;})();

let albums = [], filterAlbum = 'all';

async function loadGallery() {
  const { data: al } = await dbAdmin.from('gallery_albums').select('*').eq('active', true).order('created_at', {ascending: false});
  albums = al || [];
  const alEl = document.getElementById('albums-list');
  alEl.innerHTML = '<button class="album-tab-btn ' + (filterAlbum==='all'?'active-tab':'') + '" onclick="setFilter('all')">All</button>' +
    albums.map(a => '<button class="album-tab-btn ' + (filterAlbum===a.id?'active-tab':'') + '" onclick="setFilter('' + a.id + '')">' + a.name + '</button>').join('');
  // populate select
  const sel = document.getElementById('photo-album-select');
  sel.innerHTML = '<option value="">No album</option>' + albums.map(a => '<option value="' + a.id + '">' + a.name + '</option>').join('');
  loadPhotos();
}

async function loadPhotos() {
  const grid = document.getElementById('photos-grid');
  let q = dbAdmin.from('gallery_items').select('id,image_url,caption,album_id').order('created_at', {ascending: false});
  if (filterAlbum !== 'all') q = q.eq('album_id', filterAlbum);
  const { data } = await q;
  if (!data || !data.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#9ca3af;">No photos yet. Click + Add Photo to upload.</div>'; return; }
  grid.innerHTML = data.map(p =>
    '<div style="position:relative;border-radius:.75rem;overflow:hidden;aspect-ratio:1;background:#f3f4f6;">' +
    '<img src="' + p.image_url + '" style="width:100%;height:100%;object-fit:cover;">' +
    '<div style="position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;" onmouseover="this.style.background='rgba(0,0,0,.4)'" onmouseout="this.style.background='rgba(0,0,0,0)'">' +
    '<button onclick="deletePhoto('' + p.id + '')" style="position:absolute;top:.5rem;right:.5rem;background:rgba(220,38,38,.9);color:#fff;border:none;border-radius:.375rem;padding:.25rem .625rem;font-size:.75rem;font-weight:500;cursor:pointer;">Delete</button>' +
    (p.caption ? '<p style="position:absolute;bottom:.5rem;left:.5rem;right:.5rem;color:#fff;font-size:.75rem;background:rgba(0,0,0,.5);padding:.25rem .5rem;border-radius:.25rem;">' + p.caption + '</p>' : '') +
    '</div></div>'
  ).join('');
}

function setFilter(id) { filterAlbum = id; loadGallery(); }

function openAlbumModal() { document.getElementById('album-modal').style.display='flex'; }
function openItemModal() { document.getElementById('item-modal').style.display='flex'; }

document.getElementById('album-form').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await dbAdmin.from('gallery_albums').insert([{name: fd.get('name'), description: fd.get('description'), active: true}]);
  document.getElementById('album-modal').style.display = 'none';
  e.target.reset(); loadGallery();
});

// Preview on URL input
document.querySelector('#photo-form [name=image_url]').addEventListener('blur', e => {
  const url = e.target.value.trim();
  if (url) { document.getElementById('preview-img').src = url; document.getElementById('photo-preview').style.display='block'; }
});

document.getElementById('photo-form').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const err = document.getElementById('photo-err');
  err.style.display='none';
  const { error } = await dbAdmin.from('gallery_items').insert([{
    image_url: fd.get('image_url'), caption: fd.get('caption') || null,
    album_id: fd.get('album_id') || null
  }]);
  if (error) { err.textContent = error.message; err.style.display='block'; }
  else { document.getElementById('item-modal').style.display='none'; e.target.reset(); document.getElementById('photo-preview').style.display='none'; loadPhotos(); }
});

async function deletePhoto(id) {
  if (!confirm('Delete this photo?')) return;
  await dbAdmin.from('gallery_items').delete().eq('id', id);
  loadPhotos();
}

checkAuth().then(s => { if (s) loadGallery(); });

</script></body></html>
