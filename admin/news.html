<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
  <h1 style="font-family:Georgia,serif;font-size:1.875rem;font-weight:700;color:#0f3d12;">News Articles</h1>
  <button onclick="openModal()" class="btn-primary">+ Add New</button>
</div>
<div class="card" style="overflow:hidden;margin-bottom:2rem;">
  <table style="width:100%;border-collapse:collapse;" id="items-table">
    <thead style="background:#f9fafb;"><tr><th style="text-align:left;padding:.5rem .75rem;font-size:.75rem;color:#6b7280;font-weight:600;text-transform:uppercase;">Title</th><th style="text-align:left;padding:.5rem .75rem;font-size:.75rem;color:#6b7280;font-weight:600;text-transform:uppercase;">Status</th><th style="text-align:left;padding:.5rem .75rem;font-size:.75rem;color:#6b7280;font-weight:600;text-transform:uppercase;">Date</th><th style="padding:.5rem .75rem;"></th></tr></thead>
    <tbody id="items-body"><tr><td colspan="5" style="text-align:center;padding:2rem;color:#9ca3af;">Loading...</td></tr></tbody>
  </table>

<!-- Modal -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:1rem;padding:2rem;max-width:36rem;width:100%;max-height:90vh;overflow-y:auto;position:relative;">
    <button onclick="closeModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;font-size:1.5rem;color:#6b7280;">&times;</button>
    <h2 id="modal-title" style="font-family:Georgia,serif;font-size:1.25rem;font-weight:700;color:#0f3d12;margin-bottom:1.5rem;">Add New</h2>
    <form id="item-form">
      <input type="hidden" name="_id">
<div style="margin-bottom:1rem;"><label class="form-label">Title *</label><input class="form-input" type="text" name="title" placeholder="Article title" required></div>
<div style="margin-bottom:1rem;"><label class="form-label">Excerpt</label><textarea class="form-input" name="excerpt" rows="2" ></textarea></div>
<div style="margin-bottom:1rem;"><label class="form-label">Content (HTML)</label><textarea class="form-input" name="body_html" rows="8" ></textarea></div>
<div style="margin-bottom:1rem;"><label class="form-label">Image URL</label><input class="form-input" type="text" name="cover_image_url" placeholder="https://media.victoriasugar.ug/images/..." ></div>
<div style="margin-bottom:1rem;"><label class="form-label">Publish Date</label><input class="form-input" type="date" name="published_date" placeholder="" ></div>
<div style="margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;"><input type="checkbox" name="is_published" id="is_published" checked><label for="is_published" class="form-label" style="margin:0;">Published (visible on site)</label></div>
      <div id="form-error" style="display:none;color:#dc2626;font-size:.875rem;margin-bottom:1rem;"></div>
      <div style="display:flex;gap:.75rem;">
        <button type="submit" id="form-submit" class="btn-primary flex-1 justify-center">Save</button>
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
      </div>
    </form>
  </div>

<script>

const SUPABASE_URL = 'https://ffsddbbtgoxbqlrnvcrm.supabase.co';
const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmc2RkYmJ0Z294YnFscm52Y3JtIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY0MTMxNCwiZXhwIjoyMDk4MjE3MzE0fQ.OJVRH623HKsMbGah9Zj3zfHLQZOgAR1zNy6fHqJ-3JA';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmc2RkYmJ0Z294YnFscm52Y3JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDEzMTQsImV4cCI6MjA5ODIxNzMxNH0.EYNEFQqUR7ZV63XCHKo_RuS2tIJRxN1VfF6Tx3BAb3I';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const dbAdmin = createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);


async function checkAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/admin/login.html'; return null; }
  return session;
}

document.getElementById("logout-btn").addEventListener("click", async () => { await db.auth.signOut(); window.location.href = "/admin/login.html"; });
(async () => { const s = await checkAuth(); if (s) document.getElementById("admin-user").textContent = s.user.email; })();

let editId = null;
async function loadItems() {
  const { data } = await dbAdmin.from('news').select('id,title,is_published,published_date').order('created_at',{ascending:false});
  const tb = document.getElementById('items-body');
  if (!data || !data.length) { tb.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:#9ca3af;">No articles yet.</td></tr>'; return; }
  tb.innerHTML = data.map(a =>
    '<tr style="border-top:1px solid #f3f4f6;">' +
    '<td style="padding:.75rem;font-size:.875rem;color:#1f2937;font-weight:500;">' + a.title + '</td>' +
    '<td style="padding:.75rem;"><span style="font-size:.6875rem;font-weight:600;padding:.2rem .5rem;border-radius:2rem;background:' + (a.is_published?'#f0f7f1':'#f3f4f6') + ';color:' + (a.is_published?'#1b5e20':'#6b7280') + ';">' + (a.is_published?'Published':'Draft') + '</span></td>' +
    '<td style="padding:.75rem;font-size:.75rem;color:#9ca3af;">' + (a.published_date ? new Date(a.published_date).toLocaleDateString() : '') + '</td>' +
    '<td style="padding:.75rem;text-align:right;white-space:nowrap;">' +
    '<button onclick="editItem('' + a.id + '')" style="color:#1b5e20;font-size:.8125rem;font-weight:500;background:none;border:none;cursor:pointer;margin-right:.5rem;">Edit</button>' +
    '<button onclick="deleteItem('' + a.id + '')" style="color:#dc2626;font-size:.8125rem;font-weight:500;background:none;border:none;cursor:pointer;">Delete</button>' +
    '</td></tr>'
  ).join('');
}

function openModal(data={}) {
  editId = data.id || null;
  const form = document.getElementById('item-form');
  form.querySelectorAll('[name]').forEach(el => {
    const v = data[el.name];
    if (el.type==='checkbox') el.checked = v !== undefined ? v : el.name==='is_published';
    else if (el.name==='published_date') el.value = v ? v.split('T')[0] : new Date().toISOString().split('T')[0];
    else el.value = v || '';
  });
  document.getElementById('modal-title').textContent = editId ? 'Edit Article' : 'Add Article';
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('form-error').style.display = 'none';
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

async function editItem(id) {
  const { data } = await dbAdmin.from('news').select('*').eq('id', id).single();
  openModal(data);
}

async function deleteItem(id) {
  if (!confirm('Delete this article? This cannot be undone.')) return;
  await dbAdmin.from('news').delete().eq('id', id);
  loadItems();
}

document.getElementById('item-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('form-submit');
  const err = document.getElementById('form-error');
  btn.disabled=true; btn.textContent='Saving...'; err.style.display='none';
  const fd = new FormData(e.target);
  const payload = {
    title: fd.get('title'),
    excerpt: fd.get('excerpt'), body_html: fd.get('body_html'),
    cover_image_url: fd.get('cover_image_url') || null,
    published_date: fd.get('published_date') ? new Date(fd.get('published_date')).toISOString() : new Date().toISOString(),
    is_published: fd.get('is_published') === 'on'
  };
  const { error } = editId
    ? await dbAdmin.from('news').update(payload).eq('id', editId)
    : await dbAdmin.from('news').insert([payload]);
  if (error) { err.textContent = error.message; err.style.display='block'; }
  else { closeModal(); loadItems(); }
  btn.disabled=false; btn.textContent='Save';
});

checkAuth().then(s => { if (s) loadItems(); });

</script>
