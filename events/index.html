<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Events — Victoria Sugar Limited</title>
  <meta name="description" content="Events — Victoria Sugar Limited Uganda">
  <link rel="icon" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hero">
  <div class="container-main page-hero-content">
    <span class="section-label">Calendar</span>
    <h1 style="font-family:Georgia,serif;font-size:2.5rem;font-weight:700;color:#fff;margin:.5rem 0 1rem;">Events</h1>
    <p style="color:#b4dab6;max-width:40rem;">Upcoming events, exhibitions, and industry conferences featuring Victoria Sugar.</p>
    <nav style="margin-top:1rem;font-size:.875rem;"><a href="/" style="color:#4da052;text-decoration:none;">Home</a> <span style="color:#145218;"> &rsaquo; </span> Events</nav>
  </div>
</div>

<section class="section">
  <div class="container-main">
    <span class="section-label">Coming Up</span>
    <h2 class="section-title mb-8">Upcoming Events</h2>
    <div id="upcoming-events" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16"></div>
    <span class="section-label">Archive</span>
    <h2 class="section-title mb-8">Past Events</h2>
    <div id="past-events" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </div>
</section>

<div id="footer"></div><div id="inquiry-modal"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>tailwind.config={theme:{extend:{colors:{green:{50:'#f0f7f1',100:'#d9edd9',200:'#b4dab6',300:'#80c083',400:'#4da052',500:'#2e7d32',600:'#1b5e20',700:'#145218',800:'#0f3d12',900:'#0a290c',950:'#051506'},gold:{50:'#fdf9ec',100:'#faf0ca',200:'#f5df92',300:'#efc95a',400:'#c8a84b',500:'#b8922f',600:'#9a7424',700:'#7a5a1c',800:'#5e4415',900:'#3d2c0d',950:'#1f1506'}},fontFamily:{sans:['Inter','system-ui','sans-serif'],heading:['Georgia','Times New Roman','serif']}}}}</script>
<script src="/js/supabase-client.js"></script>
<script src="/js/nav.js"></script><script src="/js/footer.js"></script><script src="/js/inquiry-modal.js"></script>
<script>initNav();initFooter();initInquiryModal();

async function loadEvents() {
  const up = document.getElementById('upcoming-events');
  const ps = document.getElementById('past-events');
  const now = new Date().toISOString();
  const { data: upcoming } = await db.from('events').select('*').gte('event_date', now).order('event_date', {ascending: true}).limit(6);
  const { data: past } = await db.from('events').select('*').lt('event_date', now).order('event_date', {ascending: false}).limit(6);
  function renderEvent(e) {
    const d = e.event_date ? new Date(e.event_date) : null;
    return '<div class="card p-6 flex gap-4">' +
      '<div style="min-width:3.5rem;text-align:center;background:#f0f7f1;border-radius:.75rem;padding:.5rem;">' +
      '<div style="font-size:1.5rem;font-weight:700;color:#0f3d12;font-family:Georgia,serif;">' + (d ? d.getDate() : '') + '</div>' +
      '<div style="font-size:.6875rem;font-weight:600;color:#c8a84b;text-transform:uppercase;">' + (d ? d.toLocaleString('en',{month:'short'}) : '') + '</div>' +
      '<div style="font-size:.6875rem;color:#6b7280;">' + (d ? d.getFullYear() : '') + '</div>' +
      '</div>' +
      '<div>' +
      '<h3 style="font-family:Georgia,serif;font-weight:700;color:#0f3d12;margin-bottom:.25rem;">' + e.title + '</h3>' +
      (e.location ? '<p style="color:#6b7280;font-size:.8125rem;margin-bottom:.25rem;">📍 ' + e.location + '</p>' : '') +
      '<p style="color:#6b7280;font-size:.875rem;line-height:1.5;">' + (e.description || '') + '</p>' +
      '</div></div>';
  }
  up.innerHTML = upcoming && upcoming.length ? upcoming.map(renderEvent).join('') : '<p class="text-gray-400 text-center py-6">No upcoming events.</p>';
  ps.innerHTML = past && past.length ? past.map(renderEvent).join('') : '<p class="text-gray-400 text-center py-6">No past events to show.</p>';
}
loadEvents();

</script>
</body></html>
