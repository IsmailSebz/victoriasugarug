<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Article — Victoria Sugar Limited</title>
  <link rel="icon" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/pages/news-article.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hero news-article-block">
  <div class="container-main page-hero-content">
    <span class="section-label" id="article-category">News</span>
    <h1 class="news-article-heading" id="article-hero-title">Loading...</h1>
    <p class="news-article-text-style" id="article-date"></p>
    <nav class="news-article-block-2"><a class="breadcrumb-link" href="/">Home</a> <span class="breadcrumb-sep"> &rsaquo; </span><a class="breadcrumb-link" href="/news/">News</a> <span class="breadcrumb-sep"> &rsaquo; </span> Article</nav>
  </div>
</div>
<section class="section">
  <div class="container-main">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10" id="article-content">
      <div class="lg:col-span-2">
        <div class="news-article-block-3" id="article-image-wrap"><img class="news-article-media" id="article-image" src=""></div>
        <div id="article-body" class="prose news-article-text-style-2"></div>
        <div class="news-article-divider-row">
          <a href="/news/" class="btn-secondary">← Back to News</a>
        </div>
      </div>
      <div>
        <div class="card p-6">
          <h3 class="subheading-mb">Recent Articles</h3>
          <div id="recent-posts">Loading...</div>
        </div>
        <div class="card p-6 mt-5">
          <h3 class="news-article-subheading">Share</h3>
          <div class="flex gap-3">
            <a class="news-article-link" href="javascript:window.open('https://wa.me/?text='+encodeURIComponent(document.title+' '+location.href),'_blank')">WhatsApp</a>
            <a class="news-article-link-2" href="javascript:window.open('mailto:?subject='+encodeURIComponent(document.title)+'&body='+encodeURIComponent(location.href),'_blank')">Email</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer"></div><div id="inquiry-modal"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/tailwind-config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/nav.js"></script><script src="/js/footer.js"></script><script src="/js/inquiry-modal.js"></script>
<script src="/js/pages/news-article.js"></script>
</body></html>
