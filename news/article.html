<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Article — Victoria Sugar Limited</title>
  <link rel="icon" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hero" style="padding:4rem 0 6rem;">
  <div class="container-main page-hero-content">
    <span class="section-label" id="article-category">News</span>
    <h1 id="article-hero-title" style="font-family:Georgia,serif;font-size:2rem;font-weight:700;color:#fff;margin:.5rem 0 1rem;max-width:48rem;">Loading...</h1>
    <p id="article-date" style="color:#b4dab6;font-size:.875rem;"></p>
    <nav style="margin-top:.75rem;font-size:.875rem;"><a href="/" style="color:#4da052;text-decoration:none;">Home</a> <span style="color:#145218;"> &rsaquo; </span><a href="/news/" style="color:#4da052;text-decoration:none;">News</a> <span style="color:#145218;"> &rsaquo; </span> Article</nav>
  </div>
</div>
<section class="section">
  <div class="container-main">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10" id="article-content">
      <div class="lg:col-span-2">
        <div id="article-image-wrap" style="border-radius:.75rem;overflow:hidden;margin-bottom:2rem;"><img id="article-image" src="" style="width:100%;max-height:24rem;object-fit:cover;"></div>
        <div id="article-body" style="color:#374151;line-height:1.8;font-size:1.0625rem;" class="prose"></div>
        <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid #f3f4f6;">
          <a href="/news/" class="btn-secondary">← Back to News</a>
        </div>
      </div>
      <div>
        <div class="card p-6">
          <h3 style="font-family:Georgia,serif;font-weight:700;color:#0f3d12;margin-bottom:1rem;">Recent Articles</h3>
          <div id="recent-posts">Loading...</div>
        </div>
        <div class="card p-6 mt-5">
          <h3 style="font-family:Georgia,serif;font-weight:700;color:#0f3d12;margin-bottom:.75rem;">Share</h3>
          <div class="flex gap-3">
            <a href="javascript:window.open('https://wa.me/?text='+encodeURIComponent(document.title+' '+location.href),'_blank')" style="background:#25D366;color:#fff;padding:.5rem .875rem;border-radius:.5rem;font-size:.875rem;text-decoration:none;font-weight:500;">WhatsApp</a>
            <a href="javascript:window.open('mailto:?subject='+encodeURIComponent(document.title)+'&body='+encodeURIComponent(location.href),'_blank')" style="background:#f3f4f6;color:#374151;padding:.5rem .875rem;border-radius:.5rem;font-size:.875rem;text-decoration:none;font-weight:500;">Email</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer"></div><div id="inquiry-modal"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>tailwind.config={theme:{extend:{colors:{green:{50:'#f0f7f1',100:'#d9edd9',200:'#b4dab6',300:'#80c083',400:'#4da052',500:'#2e7d32',600:'#1b5e20',700:'#145218',800:'#0f3d12',900:'#0a290c',950:'#051506'},gold:{50:'#fdf9ec',100:'#faf0ca',200:'#f5df92',300:'#efc95a',400:'#c8a84b',500:'#b8922f',600:'#9a7424',700:'#7a5a1c',800:'#5e4415',900:'#3d2c0d',950:'#1f1506'}},fontFamily:{sans:['Inter','system-ui','sans-serif'],heading:['Georgia','Times New Roman','serif']}}}}</script>
<script src="/js/supabase-client.js"></script>
<script src="/js/nav.js"></script><script src="/js/footer.js"></script><script src="/js/inquiry-modal.js"></script>
<script>initNav();initFooter();initInquiryModal();

async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('article-content').innerHTML = '<p style="color:#dc2626;">Article not found.</p>'; return; }
  const { data, error } = await db.from('news_articles').select('*').eq('id', id).single();
  if (error || !data) { document.getElementById('article-content').innerHTML = '<p style="color:#dc2626;">Article not found or no longer available.</p>'; return; }
  document.title = data.title + ' — Victoria Sugar Limited';
  document.getElementById('article-hero-title').textContent = data.title;
  document.getElementById('article-date').textContent = data.published_at ? new Date(data.published_at).toLocaleDateString('en-UG',{day:'numeric',month:'long',year:'numeric'}) : '';
  document.getElementById('article-category').textContent = data.category || 'News';
  if (data.image_url) {
    document.getElementById('article-image').src = data.image_url;
    document.getElementById('article-image').alt = data.title;
  } else {
    document.getElementById('article-image-wrap').style.display = 'none';
  }
  document.getElementById('article-body').innerHTML = data.content || data.excerpt || '';
  // load recent
  const { data: recent } = await db.from('news_articles').select('id,title,image_url,published_at,category').eq('published',true).neq('id',id).order('published_at',{ascending:false}).limit(3);
  if (recent && recent.length) {
    document.getElementById('recent-posts').innerHTML = recent.map(r =>
      '<a href="/news/article.html?id=' + r.id + '" class="flex gap-3 items-start py-3 border-b border-gray-100 last:border-0" style="text-decoration:none;">' +
      (r.image_url ? '<img src="' + r.image_url + '" style="width:4rem;height:3rem;object-fit:cover;border-radius:.375rem;flex-shrink:0;">' : '<div style="width:4rem;height:3rem;background:#f0f7f1;border-radius:.375rem;flex-shrink:0;"></div>') +
      '<div><p style="font-size:.8125rem;font-weight:600;color:#0f3d12;line-height:1.4;" class="line-clamp-2">' + r.title + '</p>' +
      '<p style="font-size:.75rem;color:#9ca3af;margin-top:.2rem;">' + (r.published_at ? new Date(r.published_at).toLocaleDateString('en-UG',{month:'short',day:'numeric',year:'numeric'}) : '') + '</p>' +
      '</div></a>'
    ).join('');
  }
}
loadArticle();

</script>
</body></html>
